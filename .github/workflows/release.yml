name: Release

# Manual-only. Pick a tag (e.g. v0.2.0); the workflow tags the commit, then lets
# GoReleaser build wfo-desktop and create the GitHub release automatically.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        # cgo links: tesseract/leptonica (OCR), cairo/pango (overlay) and
        # webkitgtk/gtk (Wails desktop shell). pkg-config must find them all.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libtesseract-dev libleptonica-dev tesseract-ocr-eng \
            libcairo2-dev libpango1.0-dev \
            libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cmd/wfo-desktop/frontend/package-lock.json

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.98

      - name: Create and push tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ inputs.tag }}
